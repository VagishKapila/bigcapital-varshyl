server {
    listen 80 default_server;
    resolver 8.8.8.8 valid=30s;

    # Proxy API calls to the BigCapital server (public URL)
    location /api {
        proxy_pass https://server-production-874d4.up.railway.app;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host server-production-874d4.up.railway.app;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_ssl_server_name on;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 300s;
    }

    # Proxy WebSocket connections
    location /socket {
        proxy_pass https://server-production-874d4.up.railway.app;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "Upgrade";
        proxy_set_header Host server-production-874d4.up.railway.app;
        proxy_ssl_server_name on;
        proxy_read_timeout 300s;
    }

    # Everything else goes to the webapp (public URL)
    location / {
        proxy_pass https://webapp-production-1185.up.railway.app;
        proxy_http_version 1.1;
        proxy_set_header Host webapp-production-1185.up.railway.app;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_ssl_server_name on;
    }
}
